name: Fetch — Légifrance

on:
  schedule:
    # Lundi, mercredi, vendredi à 08h00 UTC (JORF publié le matin)
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch:

jobs:
  fetch:
    name: Sync Légifrance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Légifrance connector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: npx tsx src/scripts/run-connector.ts legifrance
