name: Fetch — data.gouv.fr

on:
  schedule:
    # Tous les jours à 07h00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  fetch:
    name: Sync data.gouv.fr
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Plus long : plusieurs orgs interrogées

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run data.gouv.fr connector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx src/scripts/run-connector.ts datagouv
